<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Блог{% endblock %}</title>
</head>
<body>
    {% if current_user.is_authenticated %}
        <p>Вы вошли как {{ current_user.username }} | <a href="{{ url_for('logout') }}">Выйти</a> | <a href="{{ url_for('new_post') }}">Новая запись</a></p>
    {% else %}
        <p><a href="{{ url_for('login') }}">Войти</a></p>
    {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
